naftiko: 1.0.0-alpha2
info:
  label: Aruba Central API — Sites
  description: 'Aruba Central API — Sites. 6 operations. Lead operation: List All Sites. Self-contained Naftiko capability
    covering one Aruba business surface.'
  tags:
  - Aruba
  - Sites
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARUBA_API_KEY: ARUBA_API_KEY
capability:
  consumes:
  - type: http
    namespace: central-sites
    baseUri: https://apigw-prod2.central.arubanetworks.com
    description: Aruba Central API — Sites business capability. Self-contained, no shared references.
    resources:
    - name: central-v2-sites
      path: /central/v2/sites
      operations:
      - name: getsites
        method: GET
        description: List All Sites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: calculate_total
          in: query
          type: boolean
          description: Whether to calculate and return the total number of sites.
      - name: createsite
        method: POST
        description: Create a New Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: central-v2-sites-site_id
      path: /central/v2/sites/{site_id}
      operations:
      - name: getsitebyid
        method: GET
        description: Get Site Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: integer
          description: The unique identifier of the site.
          required: true
      - name: updatesite
        method: PATCH
        description: Update Site Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: integer
          description: The unique identifier of the site to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesite
        method: DELETE
        description: Delete a Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: integer
          description: The unique identifier of the site to delete.
          required: true
    - name: central-v2-sites-site_id-associate
      path: /central/v2/sites/{site_id}/associate
      operations:
      - name: associatedevicestosite
        method: POST
        description: Associate Devices to a Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: integer
          description: The unique identifier of the site.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ARUBA_API_KEY}}'
  exposes:
  - type: rest
    namespace: central-sites-rest
    port: 8080
    description: REST adapter for Aruba Central API — Sites. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/central/v2/sites
      name: central-v2-sites
      description: REST surface for central-v2-sites.
      operations:
      - method: GET
        name: getsites
        description: List All Sites
        call: central-sites.getsites
        with:
          calculate_total: rest.calculate_total
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsite
        description: Create a New Site
        call: central-sites.createsite
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/central/v2/sites/{site-id}
      name: central-v2-sites-site-id
      description: REST surface for central-v2-sites-site_id.
      operations:
      - method: GET
        name: getsitebyid
        description: Get Site Details
        call: central-sites.getsitebyid
        with:
          site_id: rest.site_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatesite
        description: Update Site Details
        call: central-sites.updatesite
        with:
          site_id: rest.site_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesite
        description: Delete a Site
        call: central-sites.deletesite
        with:
          site_id: rest.site_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/central/v2/sites/{site-id}/associate
      name: central-v2-sites-site-id-associate
      description: REST surface for central-v2-sites-site_id-associate.
      operations:
      - method: POST
        name: associatedevicestosite
        description: Associate Devices to a Site
        call: central-sites.associatedevicestosite
        with:
          site_id: rest.site_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: central-sites-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aruba Central API — Sites. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-sites
      description: List All Sites
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: central-sites.getsites
      with:
        calculate_total: tools.calculate_total
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-site
      description: Create a New Site
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: central-sites.createsite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-site-details
      description: Get Site Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: central-sites.getsitebyid
      with:
        site_id: tools.site_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-site-details
      description: Update Site Details
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: central-sites.updatesite
      with:
        site_id: tools.site_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-site
      description: Delete a Site
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: central-sites.deletesite
      with:
        site_id: tools.site_id
      outputParameters:
      - type: object
        mapping: $.
    - name: associate-devices-site
      description: Associate Devices to a Site
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: central-sites.associatedevicestosite
      with:
        site_id: tools.site_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
