specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Aruba
providerId: aruba
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Network Management
  - Networking
  - SD-WAN
  - Security
  - Wireless
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for HPE Aruba Networking APIs — APIs are bundled with subscription
  licenses (Aruba Central Foundation/Advanced, ClearPass), perpetual hardware purchases (AOS-CX, EdgeConnect),
  and support contracts. There is no per-API metered billing line.
sources:
  - https://www.arubanetworks.com/
  - https://www.hpe.com/us/en/aruba-networking.html
  - https://focus.finops.org/focus-specification/v1-3/
notes: APIs are not separately metered or invoiced. Cost is allocated via the parent device/subscription
  SKU. Treat the meters below as proxies for activity tracking rather than billing inputs.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Hewlett Packard Enterprise (HPE Aruba Networking)
serviceCategory: Networking
billingModel:
  pricingCategory: Subscription + Perpetual License
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: HPE Aruba Networking
  ServiceCategory: Networking
  ServiceSubcategory: Network Management & Security
  ProviderName: HPE Aruba Networking
  PublisherName: Hewlett Packard Enterprise
  InvoiceIssuerName: Hewlett Packard Enterprise
  BillingCurrency: USD
  PricingCategory: Subscription + Perpetual License
  ChargeCategory: Purchase
meters:
  - name: aruba_central_subscription
    description: Aruba Central Foundation/Advanced/Premium device-month subscription
    unit: device-month
    aggregation: max
    dimensions:
      - tier
      - device_type
      - region
  - name: clearpass_license
    description: ClearPass policy manager licenses (endpoint counts)
    unit: endpoint
    aggregation: max
    dimensions:
      - product
      - region
  - name: edgeconnect_subscription
    description: EdgeConnect SD-WAN appliance/site subscription
    unit: site-month
    aggregation: max
    dimensions:
      - bandwidth_tier
      - region
  - name: api_calls
    description: API call activity — not separately billed; tracked for capacity planning only
    unit: request
    aggregation: sum
    dimensions:
      - product
      - cluster
principles:
  - name: Visibility
    description: Use HPE GreenLake / Aruba Central usage reports and the per-product invoice line items
      from HPE to surface the underlying device/subscription costs that fund API access.
  - name: Allocation
    description: Allocate Aruba spend by site, business unit, and device group using Aruba Central labels
      and HPE GreenLake tagging; APIs themselves carry no separate cost line.
  - name: Optimization
    description: Right-size Central tiers (Foundation vs Advanced), retire shelfware ClearPass endpoint
      licenses, and consolidate AirWave instances. API access does not drive cost — device counts and
      subscription tiers do.
  - name: Accountability
    description: Network architects and IT ops own Aruba spend; review device subscriptions quarterly
      against actual deployed counts in Central inventory.
maintainers:
