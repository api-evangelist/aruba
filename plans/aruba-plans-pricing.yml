specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Aruba
providerId: aruba
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud
  - Infrastructure
  - Network Management
  - Networking
  - SD-WAN
  - Security
  - Switches
  - Wireless
description: Aruba (HPE Aruba Networking) does not publish public API pricing for Aruba Central, ClearPass,
  AOS-CX, EdgeConnect, or AirWave APIs. APIs are bundled with the underlying device subscriptions and
  enterprise contracts; pricing is quote-based through HPE / channel partners.
sources:
  - https://www.arubanetworks.com/
  - https://developer.arubanetworks.com/
notes: No public API pricing page found. Aruba product pricing (Aruba Central foundation/advanced subscriptions,
  ClearPass perpetual + support, AOS-CX hardware) is sold via HPE/Aruba sales and channel partners. Plans
  below are placeholder shapes; do not treat numbers as authoritative.
plans:
  - id: aruba-platform-bundled
    name: Bundled with Aruba Subscription
    type: enterprise
    description: API access is included with the underlying Aruba product subscription (Central Foundation,
      Central Advanced, ClearPass licenses, etc.). No separate per-API metering is published.
    entries:
      - label: API Access
        name: api_access
        type: subscription
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included with product subscription (contact HPE sales)
        userMultiplied: false
    elements:
      - name: Aruba Central API
      - name: Aruba ClearPass API
      - name: Aruba AOS-CX REST API
      - name: Aruba EdgeConnect SD-WAN API
      - name: Aruba Fabric Composer API
      - name: Aruba User Experience Insight API
      - name: Aruba AirWave API
maintainers:
